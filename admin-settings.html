<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Einstellungen | FWStudios Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap');
        * { font-family: 'Inter', sans-serif; }
        body { background: #0a0e27; overflow-x: hidden; }
        .gradient-bg { background: linear-gradient(135deg, #00d4ff 0%, #0099ff 100%); }
        .gradient-text { background: linear-gradient(135deg, #00d4ff 0%, #0099ff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .text-glow { text-shadow: 0 0 10px rgba(0, 212, 255, 0.5), 0 0 20px rgba(0, 212, 255, 0.3); }
        .gradient-border { position: relative; background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(0, 153, 255, 0.1)); border: 1px solid transparent; }
        .gradient-border::before { content: ''; position: absolute; inset: 0; border-radius: inherit; padding: 2px; background: linear-gradient(135deg, #00d4ff, #0099ff); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body class="bg-[#0a0e27]">
    <nav class="bg-[#0f1629] border-b border-gray-800 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div>
                    <h1 class="text-2xl font-black gradient-text text-glow">FWStudios Admin</h1>
                </div>
                <div class="flex items-center space-x-6">
                    <a href="admin-dashboard" class="text-gray-400 hover:text-[#00d4ff] transition-colors">Leads</a>
                    <a href="admin-finanzen" class="text-gray-400 hover:text-[#00d4ff] transition-colors">Finanzen</a>
                    <a href="admin-settings" class="text-[#00d4ff] font-semibold">Einstellungen</a>
                    <a href="admin-legal" class="text-gray-400 hover:text-[#00d4ff] transition-colors">Rechtliches</a>
                    <span class="text-gray-400 text-sm" id="admin-email"></span>
                    <button onclick="logout()" class="px-4 py-2 bg-red-500/20 hover:bg-red-500/30 text-red-400 rounded-lg transition-all duration-300">
                        Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="mb-8">
            <h2 class="text-3xl font-bold text-white mb-2">Einstellungen</h2>
            <p class="text-gray-400">Chatbot-Preise, Features und Sales verwalten</p>
        </div>

        <!-- Sale Banner Section -->
        <div class="gradient-border rounded-xl bg-[#0f1629]/50 backdrop-blur-sm overflow-hidden mb-8">
            <div class="p-6 border-b border-gray-800">
                <h3 class="text-xl font-bold text-white">Sale / Aktion</h3>
                <p class="text-gray-400 text-sm">Banner und Rabatte für Sonderaktionen</p>
            </div>
            <div class="p-6">
                <div class="grid md:grid-cols-2 gap-6">
                    <div>
                        <label class="flex items-center space-x-3 mb-6">
                            <input type="checkbox" id="sale-active" class="w-5 h-5 rounded border-gray-700 text-[#00d4ff] focus:ring-[#00d4ff]">
                            <span class="text-white font-semibold">Sale aktiv</span>
                        </label>

                        <div>
                            <label class="block text-gray-300 text-sm font-semibold mb-2">Banner-Text</label>
                            <input type="text" id="sale-banner-text" class="w-full px-4 py-3 rounded-lg bg-[#0a0e27] border border-gray-700 focus:border-[#00d4ff] outline-none text-white" placeholder="Black Friday Sale">
                        </div>
                    </div>
                    <div>
                        <div class="mb-4">
                            <label class="block text-gray-300 text-sm font-semibold mb-2">Banner-Farbe</label>
                            <input type="color" id="sale-banner-color" class="w-full h-12 rounded-lg bg-[#0a0e27] border border-gray-700 focus:border-[#00d4ff] outline-none">
                        </div>
                        <div>
                            <label class="block text-gray-300 text-sm font-semibold mb-2">Rabatt (%)</label>
                            <input type="number" id="sale-discount" min="0" max="100" class="w-full px-4 py-3 rounded-lg bg-[#0a0e27] border border-gray-700 focus:border-[#00d4ff] outline-none text-white" placeholder="0">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Monthly Plan Section -->
        <div class="gradient-border rounded-xl bg-[#0f1629]/50 backdrop-blur-sm overflow-hidden mb-8">
            <div class="p-6 border-b border-gray-800">
                <h3 class="text-xl font-bold text-white">Monatlicher Plan</h3>
            </div>
            <div class="p-6">
                <div class="grid md:grid-cols-2 gap-6 mb-6">
                    <div>
                        <label class="block text-gray-300 text-sm font-semibold mb-2">Preis pro Monat (€)</label>
                        <input type="number" id="monthly-price" class="w-full px-4 py-3 rounded-lg bg-[#0a0e27] border border-gray-700 focus:border-[#00d4ff] outline-none text-white" placeholder="299">
                    </div>
                    <div>
                        <label class="block text-gray-300 text-sm font-semibold mb-2">Setup-Gebühr (€)</label>
                        <input type="number" id="monthly-setup" class="w-full px-4 py-3 rounded-lg bg-[#0a0e27] border border-gray-700 focus:border-[#00d4ff] outline-none text-white" placeholder="499">
                    </div>
                </div>
                <div>
                    <label class="block text-gray-300 text-sm font-semibold mb-2">Features (ein Feature pro Zeile)</label>
                    <textarea id="monthly-features" rows="10" class="w-full px-4 py-3 rounded-lg bg-[#0a0e27] border border-gray-700 focus:border-[#00d4ff] outline-none text-white font-mono text-sm" placeholder="Feature 1&#10;Feature 2&#10;Feature 3"></textarea>
                </div>
            </div>
        </div>

        <!-- Yearly Plan Section -->
        <div class="gradient-border rounded-xl bg-[#0f1629]/50 backdrop-blur-sm overflow-hidden mb-8">
            <div class="p-6 border-b border-gray-800">
                <h3 class="text-xl font-bold text-white">Jahresplan</h3>
            </div>
            <div class="p-6">
                <div class="grid md:grid-cols-3 gap-6 mb-6">
                    <div>
                        <label class="block text-gray-300 text-sm font-semibold mb-2">Preis pro Monat (€)</label>
                        <input type="number" id="yearly-price" class="w-full px-4 py-3 rounded-lg bg-[#0a0e27] border border-gray-700 focus:border-[#00d4ff] outline-none text-white" placeholder="250">
                    </div>
                    <div>
                        <label class="block text-gray-300 text-sm font-semibold mb-2">Setup-Gebühr (€)</label>
                        <input type="number" id="yearly-setup" class="w-full px-4 py-3 rounded-lg bg-[#0a0e27] border border-gray-700 focus:border-[#00d4ff] outline-none text-white" placeholder="499">
                    </div>
                    <div>
                        <label class="block text-gray-300 text-sm font-semibold mb-2">Jahrespreis gesamt (€)</label>
                        <input type="number" id="yearly-total" class="w-full px-4 py-3 rounded-lg bg-[#0a0e27] border border-gray-700 focus:border-[#00d4ff] outline-none text-white" placeholder="2500">
                    </div>
                </div>
                <div>
                    <label class="block text-gray-300 text-sm font-semibold mb-2">Features (ein Feature pro Zeile)</label>
                    <textarea id="yearly-features" rows="10" class="w-full px-4 py-3 rounded-lg bg-[#0a0e27] border border-gray-700 focus:border-[#00d4ff] outline-none text-white font-mono text-sm" placeholder="Feature 1&#10;Feature 2&#10;Feature 3"></textarea>
                </div>
            </div>
        </div>

        <!-- Save Buttons -->
        <div class="flex space-x-4">
            <button onclick="saveSettings()" class="flex-1 gradient-bg text-white px-8 py-4 rounded-lg font-bold hover:shadow-lg transition-all">
                Einstellungen speichern
            </button>
            <button onclick="resetToDefaults()" class="px-8 py-4 bg-red-500/20 hover:bg-red-500/30 text-red-400 rounded-lg font-bold transition-all">
                Zurücksetzen
            </button>
        </div>
    </div>

    <script>
        // Check if logged in
        if (localStorage.getItem('adminLoggedIn') !== 'true') {
            window.location.href = 'admin-login';
        }

        document.getElementById('admin-email').textContent = localStorage.getItem('adminEmail');

        function logout() {
            localStorage.removeItem('adminLoggedIn');
            localStorage.removeItem('adminEmail');
            window.location.href = 'admin-login';
        }

        // Load settings
        async function loadSettings() {
            const settings = await getSettings();
            if (!settings) return;

            // Sale settings
            document.getElementById('sale-active').checked = settings.sale.active;
            document.getElementById('sale-banner-text').value = settings.sale.bannerText;
            document.getElementById('sale-banner-color').value = settings.sale.bannerColor;
            document.getElementById('sale-discount').value = settings.sale.discount;

            // Monthly plan
            document.getElementById('monthly-price').value = settings.chatbot.monthly.price;
            document.getElementById('monthly-setup').value = settings.chatbot.monthly.setupFee;
            document.getElementById('monthly-features').value = settings.chatbot.monthly.features.join('\n');

            // Yearly plan
            document.getElementById('yearly-price').value = settings.chatbot.yearly.price;
            document.getElementById('yearly-setup').value = settings.chatbot.yearly.setupFee;
            document.getElementById('yearly-total').value = settings.chatbot.yearly.totalYearly;
            document.getElementById('yearly-features').value = settings.chatbot.yearly.features.join('\n');
        }

        // Save settings
        async function saveSettings() {
            const monthlyFeatures = document.getElementById('monthly-features').value.split('\n').filter(f => f.trim());
            const yearlyFeatures = document.getElementById('yearly-features').value.split('\n').filter(f => f.trim());

            const monthlyPrice = parseFloat(document.getElementById('monthly-price').value);
            const yearlyPrice = parseFloat(document.getElementById('yearly-price').value);
            const yearlyTotal = parseFloat(document.getElementById('yearly-total').value);

            const settings = {
                chatbot: {
                    monthly: {
                        price: monthlyPrice,
                        setupFee: parseFloat(document.getElementById('monthly-setup').value),
                        features: monthlyFeatures
                    },
                    yearly: {
                        price: yearlyPrice,
                        setupFee: parseFloat(document.getElementById('yearly-setup').value),
                        totalYearly: yearlyTotal,
                        savings: (monthlyPrice * 12) - yearlyTotal,
                        features: yearlyFeatures
                    }
                },
                sale: {
                    active: document.getElementById('sale-active').checked,
                    bannerText: document.getElementById('sale-banner-text').value,
                    bannerColor: document.getElementById('sale-banner-color').value,
                    discount: parseFloat(document.getElementById('sale-discount').value),
                    originalMonthlyPrice: monthlyPrice,
                    originalYearlyPrice: yearlyPrice
                }
            };

            try {
                await updateSettings(settings);
                alert('Einstellungen erfolgreich gespeichert!');
            } catch (error) {
                alert('Fehler beim Speichern der Einstellungen');
            }
        }

        // Reset to defaults
        async function resetToDefaults() {
            if (confirm('Möchten Sie wirklich alle Einstellungen auf die Standardwerte zurücksetzen?')) {
                try {
                    await resetSettings();
                    await loadSettings();
                    alert('Einstellungen wurden zurückgesetzt!');
                } catch (error) {
                    alert('Fehler beim Zurücksetzen der Einstellungen');
                }
            }
        }

        // Load on page load
        loadSettings();
    </script>
    <script src="api.js"></script>
</body>
</html>
