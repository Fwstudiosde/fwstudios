services:
  - type: web
    name: fwstudios
    runtime: node
    plan: starter
    region: frankfurt
    branch: main
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /
    autoDeploy: true
    disk:
      name: data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
      - key: NOTIFY_EMAIL
        sync: false
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
      - key: NEXT_PUBLIC_PLAUSIBLE_DOMAIN
        sync: false
      - key: NEXT_PUBLIC_CAL_LINK
        value: fwstudios/30min
      - key: NEXT_PUBLIC_CAL_ORIGIN
        value: https://app.cal.eu
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CAL_API_KEY
        sync: false
